########################################
# Global
########################################

# Single-line prompt, no blank line
add_newline = false

# If starship feels laggy in big repos, drop this a bit
scan_timeout = 30

# Overall prompt layout
format = """
$directory$git_branch$git_status$python$nodejs$rust$c$dotnet$package$cmd_duration$time
$character"""

########################################
# Prompt symbol
########################################
[character]
success_symbol = "❯"
error_symbol = "❯"
vicmd_symbol = "❮"

########################################
# Directory
########################################

[directory]
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~"
read_only = ""
style = "bold"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Workspace" = "󰲋 "

########################################
# Git
########################################

[git_branch]
symbol = " "
truncation_length = 20
style = "bold"

[git_status]
style = "bold"
conflicted = " "
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕${ahead_count}/${behind_count}"
untracked = " "
stashed   = " "
modified  = " "
staged    = " "
renamed   = " "
deleted   = " "
format = " [$all_status$ahead_behind]($style)"

########################################
# Languages / runtimes
########################################
########################################
# Languages / runtimes
########################################

[python]
symbol = "󰌠 "
pyenv_version_name = true
format = " [$symbol$version]($style)"

[nodejs]
symbol = " "
format = " [$symbol$version]($style)"

[rust]
symbol = " "
format = " [$symbol$version]($style)"

# C / C++
[c]
symbol = " "
format = " [$symbol]($style)"
detect_extensions = ["c", "h", "cpp", "hpp", "cc", "hh"]

# C# / .NET
[dotnet]
symbol = " "
heuristic = true
format = " [$symbol$version]($style)"

[package]
symbol = " "
disabled = false
format = " [$symbol$version]($style)"

########################################
# Command duration & time
########################################

[cmd_duration]
min_time = 2000  # only show if cmd > 2s
format = "   [$duration]($style)"

[time]
disabled = true
format = "   [$time]($style)"
time_format = "%H:%M"

########################################
# Extras
########################################

[aws]
disabled = true

[docker_context]
symbol = " "
format = " [$symbol$context]($style)"

[kubernetes]
disabled = true
